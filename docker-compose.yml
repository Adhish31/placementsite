version: '3.8'

services:
  app:
    build: .
    container_name: placement-app
    ports:
      - "5000:5000"
      - "5173:5173"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/placementdb

  mongo:
    image: mongo
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
