services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    ports:
      - "5000:5000"
      - "5173:5173"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/placementsite
      - JWT_SECRET=your_super_secret_key_here
    depends_on:
      - mongodb

volumes:
  mongodb_data:
